# Routing Matrix: openai
#
# OpenAI-only routing. All roles use OpenAI models exclusively.
# Use when you want to run entirely on your OpenAI API account.
#
# Glob strategy: tier suffixes (`gpt-?.?-pro*`, `gpt-?.?-mini*`, `gpt-?.?-nano*`)
# auto-track minor version bumps (gpt-5.4 → gpt-5.5) without matching wrong tier.
# The base mid-tier model stays pinned as `gpt-5.4` because `gpt-5.4*` would
# incorrectly match the suffix variants. Bump the base pin when a new minor ships.

name: openai
description: "OpenAI-only routing. All roles use OpenAI models exclusively."
updated: "2026-04-22"

roles:
  general:
    description: "Versatile catch-all, no specialization needed"
    candidates:
      - provider: openai
        model: gpt-5.4

  fast:
    description: "Quick utility tasks — parsing, classification, file ops, bulk work"
    candidates:
      - provider: openai
        model: gpt-?.?-mini*

  coding:
    description: "Code generation, implementation, debugging"
    candidates:
      - provider: openai
        model: gpt-5.4

  ui-coding:
    description: "Frontend/UI code — components, layouts, styling, spatial reasoning"
    candidates:
      - provider: openai
        model: gpt-5.4

  security-audit:
    description: "Vulnerability assessment, attack surface analysis, code auditing"
    candidates:
      - provider: openai
        model: gpt-5.4
        config:
          reasoning_effort: high

  reasoning:
    description: "Deep architectural reasoning, system design, complex multi-step analysis"
    candidates:
      - provider: openai
        model: gpt-?.?-pro*
        config:
          reasoning_effort: high

  critique:
    description: "Analytical evaluation — finding flaws in existing work, not generating solutions"
    candidates:
      - provider: openai
        model: gpt-5.4
        config:
          reasoning_effort: xhigh

  creative:
    description: "Design direction, aesthetic judgment, high-quality creative output"
    candidates:
      - provider: openai
        model: gpt-5.4

  writing:
    description: "Long-form content — documentation, marketing, case studies, storytelling"
    candidates:
      - provider: openai
        model: gpt-5.4

  research:
    description: "Deep investigation, information synthesis across multiple sources"
    candidates:
      - provider: openai
        model: gpt-?.?-pro*
        config:
          reasoning_effort: high

  vision:
    description: "Understanding visual input — screenshots, diagrams, UI mockups"
    candidates:
      - provider: openai
        model: gpt-5.4

  image-gen:
    # OpenAI image generation (gpt-image-*) is not yet available through the
    # chat-completions interface used by this provider. Falls back to the best
    # creative model for image planning, prompt crafting, and SVG generation.
    description: "Image generation (limited — gpt-image not available via chat API)"
    candidates:
      - provider: openai
        model: gpt-?.?-pro*

  critical-ops:
    description: "High-reliability operational tasks — infrastructure, orchestration, coordination"
    candidates:
      - provider: openai
        model: gpt-?.?-pro*
