# Issue Triage — powered by kenotron-ms/amplifier-app-actions
# Runs a structured triage recipe when a new issue is opened.
# Output: a comment on the issue with classification and next steps.
# Docs: https://github.com/kenotron-ms/amplifier-app-actions
name: Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: kenotron-ms/amplifier-app-actions@v1
        with:
          mode: recipe
          recipe_path: .github/amplifier/triage-recipe.yaml
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
