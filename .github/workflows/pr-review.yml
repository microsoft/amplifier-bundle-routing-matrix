# PR Review — powered by kenotron-ms/amplifier-app-actions
# Runs a structured review recipe when a new PR is opened.
# Output: a comment on the PR with findings and verdict.
# Docs: https://github.com/kenotron-ms/amplifier-app-actions
name: PR Review

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: kenotron-ms/amplifier-app-actions@v1
        with:
          mode: recipe
          recipe_path: .github/amplifier/pr-review-recipe.yaml
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
