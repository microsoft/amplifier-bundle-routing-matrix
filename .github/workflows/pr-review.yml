# PR Co-Review — autonomous Attractor review pipeline
#
# Fires when someone comments "/review-pr" on an issue. Parses any
# org/repo#number references from the comment body, then runs the Attractor
# review pipeline for each referenced PR: it fetches the diff, applies the
# review framework, posts review comments on the PR, and a summary comment
# back on the issue.
#
# NOTE: the exact amplifier-attractor CLI invocation and install command may
# need adjustment during testing; the skeleton here is correct.

name: PR Co-Review

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  review:
    if: startsWith(github.event.comment.body, '/review-pr')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v6

      - name: Parse PR references
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          REFS=$(echo "$COMMENT_BODY" | grep -oP '[\w-]+/[\w-]+#\d+' || true)
          echo "pr_refs=$REFS" >> "$GITHUB_OUTPUT"
          if [ -z "$REFS" ]; then
            echo "::warning::No PR references (org/repo#number) found in comment body"
          fi

      - name: Install attractor runtime
        run: |
          uv pip install --system 'amplifier-bundle-dev-support[attractor] @ git+https://github.com/kenotron-ms/amplifier-bundle-dev-support.git@main'

      - name: Run review pipeline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_REFS: ${{ steps.parse.outputs.pr_refs }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          echo "Reviewing PRs '${PR_REFS}' from issue #${ISSUE_NUMBER} in ${REPO_FULL_NAME}..."
          amplifier-attractor run \
            --pipeline .amplifier-resolve/review.dot \
            --goal "Review PRs: ${PR_REFS}\n\nFrom issue #${ISSUE_NUMBER} in ${REPO_FULL_NAME}" \
            --repo "${REPO_FULL_NAME}" \
            --issue "${ISSUE_NUMBER}" \
            || echo "::warning::Review pipeline failed for PRs '${PR_REFS}' (issue #${ISSUE_NUMBER})"
