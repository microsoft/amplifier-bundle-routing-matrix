# Triage Continue — powered by microsoft/amplifier-app-actions
#
# Manual investigation trigger. A trusted contributor comments /investigate on an
# issue to (re-)run the Attractor triage pipeline in investigate mode. This drives
# the same manager-supervisor loop as the initial triage (triage-review.dot): an
# investigator agent re-examines the issue independently and a quality gate validates
# the root cause is at the correct ecosystem layer before posting.
#
# Restricted to OWNER / MEMBER / COLLABORATOR author associations so only trusted
# contributors can kick off an investigation run.
#
# Docs: https://github.com/microsoft/amplifier-app-actions

name: Triage Continue

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  # /investigate — re-run the full Attractor pipeline (triage-review.dot) in
  # investigate mode via attractor_source.
  investigate:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '/investigate') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    steps:
      - uses: actions/checkout@v4

      - uses: microsoft/amplifier-app-actions@main
        with:
          bundle: git+https://github.com/kenotron-ms/amplifier-bundle-dev-support@main#subdirectory=bundles/issue-triage.bundle.md
          attractor_source: .github/amplifier/triage-review.dot
          model: claude-sonnet-4-6
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
