name: reproduce-issue
version: 5.0.0
description: >
  Reproduces an Amplifier ecosystem issue by setting up a full Amplifier testing
  environment via amplifier-tester:setup-digital-twin. Clones the affected repos
  using GITHUB_TOKEN, mirrors them into a Gitea instance, installs Amplifier with
  url_rewrites pointing those repos at Gitea (so amplifier-core comes from PyPI
  as a pre-built wheel — no Rust compilation), then runs the verification script
  from the issue body inside that environment.

context:
  context:
    number: 0
    owner: ""
    repo: ""
    title: ""
    body: ""
    author: ""
    labels: []
    event_type: ""

steps:
  - id: reproduce
    output: reproduce
    timeout: 1800
    agent: amplifier-tester:setup-digital-twin
    prompt: |
      Use amplifier-tester to set up a DTU environment and reproduce GitHub issue {{context.owner}}/{{context.repo}}#{{context.number}} inside it.

      Respond with ONLY valid JSON:
      {"reproduced": true/false, "output": "<combined stdout+stderr>", "conclusion": "<what happened>", "exit_code": 0 or 1 or -1}
    parse_json: true
